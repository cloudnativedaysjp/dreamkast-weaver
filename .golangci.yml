version: "2"
linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - exhaustive
    - goconst
    - godot
    - gosec
    - gocognit
    - makezero
    - misspell
    - nakedret
    - nestif
    - noctx
    - predeclared
    - unconvert
    - whitespace
  settings:
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 10
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - unused
          - bodyclose
          - gosec
          - gocognit
          - nestif
